<html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海龜拯救計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: flex-start;             justify-content: center;
            overflow: hidden; 
        }

        .slide-container {
            width: 95vw;
            max-width: 1200px; 
            height: 88vh; 
            margin-top: 6vh; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px 0 rgba(0, 0, 0, 0.3);
            width: 100%;
            height: 100%;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .turtle-icon {
            display: inline-block;
            animation: swimIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: translateX(30px) rotate(15deg);
        }
        @keyframes swimIn {
            to { opacity: 1; transform: translateX(0) rotate(0deg); }
        }

        @media (max-width: 768px) {
            body {
                align-items: flex-start !important;
                overflow-y: auto !important;
                overflow-x: hidden !important;
                padding: 12px 0 24px !important;
            }

            .slide-container {
                width: 100vw !important;
                height: auto !important;
                min-height: 100vh !important;
                margin-top: 0 !important;
                padding: 0 12px !important;
                box-sizing: border-box;
            }

            .glass-panel {
                flex-direction: column !important;
                gap: 16px !important;
                padding: 16px !important;
                border-radius: 1.5rem !important;
            }

            .glass-panel > div {
                width: 100%;
            }

            .glass-panel .flex.items-center.gap-2 {
                flex-wrap: wrap !important;
            }

            .glass-panel .flex.justify-between.items-center {
                flex-wrap: wrap !important;
                gap: 12px !important;
            }

            #result-number {
                font-size: 4rem !important;
            }

            #encouragement-text {
                text-align: center !important;
            }
        }
    </style>

    <script data-html-import-id="html-import-81">
        const WEIGHTS = {
            bag: 135,  
            straw: 81, 
            bottle: 45 
        };
        
        const THREAT_PER_TURTLE = 405;

        function createBubbles() {
            const container = document.getElementById('bubbles-container');
            for(let i = 0; i < 20; i++) {
                let bubble = document.createElement('div');
                bubble.className = 'bubble';
                let size = Math.random() * 30 + 10; 
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.animationDuration = (Math.random() * 5 + 5) + 's';
                bubble.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(bubble);
            }
        }
        createBubbles();

        function updateValue(type, change) {
            const input = document.getElementById(`input-${type}`);
            let val = parseInt(input.value) || 0;
            val += change;
            if (val < 0) val = 0; 
            input.value = val;
            calculate();
        }

        function resetValues() {
            document.getElementById('input-bag').value = 0;
            document.getElementById('input-straw').value = 0;
            document.getElementById('input-bottle').value = 0;
            calculate();
        }

        function calculate() {
            const bags = parseInt(document.getElementById('input-bag').value) || 0;
            const straws = parseInt(document.getElementById('input-straw').value) || 0;
            const bottles = parseInt(document.getElementById('input-bottle').value) || 0;

            const totalScore = (bags * WEIGHTS.bag) + 
                               (straws * WEIGHTS.straw) + 
                               (bottles * WEIGHTS.bottle);
            
            document.getElementById('total-score-display').innerText = totalScore.toLocaleString();

            const savedTurtles = Math.floor(totalScore / THREAT_PER_TURTLE);
            
            animateValue(document.getElementById('result-number'), savedTurtles);
            updateTurtleDisplay(savedTurtles);
            updateEncouragement(savedTurtles, totalScore);
        }

        function animateValue(obj, end, duration = 600) {
            let start = parseInt(obj.innerHTML) || 0;
            if (start === end) return;
            
            let range = end - start;
            let current = start;
            let increment = end > start ? 1 : -1;
            if(Math.abs(range) > 30) increment = end > start ? Math.ceil(range/30) : Math.floor(range/30);
            
            let stepTime = Math.abs(Math.floor(duration / (range/increment)));
            if (stepTime < 20) stepTime = 20;

            let timer = setInterval(function() {
                current += increment;
                if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
                    current = end;
                    clearInterval(timer);
                }
                obj.innerHTML = current;
            }, stepTime);
        }

        function updateTurtleDisplay(count) {
            const container = document.getElementById('turtle-display-area');
            container.innerHTML = ''; 

            if (count === 0) {
                container.innerHTML = '<span class="text-white/50 text-sm lg:text-base italic">（輸入減塑數據，讓海龜重獲新生）</span>';
                return;
            }

            const maxIcons = 15;
            let displayCount = Math.min(count, maxIcons);

            for (let i = 0; i < displayCount; i++) {
                let turtle = document.createElement('div');
                turtle.className = 'turtle-icon text-3xl lg:text-4xl filter drop-shadow-lg';
                turtle.style.animationDelay = `${i * 0.06}s`;
                turtle.innerHTML = `<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C9.5 2 7.5 4 7 6.5C5 6.5 3 7 2 9C4 9.5 5.5 11 6 13C5.5 15 4 16.5 2 17C3 19 5 19.5 7 19.5C7.5 22 9.5 24 12 24C14.5 24 16.5 22 17 19.5C19 19.5 21 19 22 17C20 16.5 18.5 15 18 13C18.5 11 20 9.5 22 9C21 7 19 6.5 17 6.5C16.5 4 14.5 2 12 2ZM12 4C13.5 4 14.8 5 15.2 6.5C15.4 7.2 15.8 7.8 16.5 8.1C17.5 8.5 18.3 9.2 18.8 10C17.8 10.7 17.2 11.8 17.2 13C17.2 14.2 17.8 15.3 18.8 16C18.3 16.8 17.5 17.5 16.5 17.9C15.8 18.2 15.4 18.8 15.2 19.5C14.8 21 13.5 22 12 22C10.5 22 9.2 21 8.8 19.5C8.6 18.8 8.2 18.2 7.5 17.9C6.5 17.5 5.7 16.8 5.2 16C6.2 15.3 6.8 14.2 6.8 13C6.8 11.8 6.2 10.7 5.2 10C5.7 9.2 6.5 8.5 7.5 8.1C8.2 7.8 8.6 7.2 8.8 6.5C9.2 5 10.5 4 12 4Z" fill="#86efac"/></svg>`;
                container.appendChild(turtle);
            }

            if (count > maxIcons) {
                let moreInfo = document.createElement('div');
                moreInfo.className = 'w-full text-center text-sm lg:text-base font-bold mt-2 text-cyan-200 animate-pulse';
                moreInfo.innerText = `...以及另外 ${count - maxIcons} 隻海龜！`;
                container.appendChild(moreInfo);
            }
        }

        function updateEncouragement(count, score) {
            const textEl = document.getElementById('encouragement-text');
            
            if (score > 0 && count === 0) {
                textEl.innerText = "快了快了！再減少一點就能救下一隻海龜！";
                textEl.className = "text-xl lg:text-2xl font-bold text-yellow-200 transition-opacity duration-300";
            } else if (count > 0 && count <= 5) {
                textEl.innerText = "太棒了！化為了實質的生命救援！";
                textEl.className = "text-xl lg:text-2xl font-bold text-green-300 transition-opacity duration-300";
            } else if (count > 5) {
                textEl.innerText = "不可思議！你們是海洋守護英雄！";
                textEl.className = "text-2xl lg:text-3xl font-black text-pink-300 drop-shadow-md transition-opacity duration-300";
            } else {
                textEl.innerText = "每一個微小的改變，都在拯救生命！";
                textEl.className = "text-xl lg:text-2xl font-bold text-cyan-200 transition-opacity duration-300";
            }
        }
        
        calculate();
    </script>
