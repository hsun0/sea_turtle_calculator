<!doctype html>
<html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海龜拯救計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome 尋找圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            /* 海洋漸層背景 */
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* 隱藏原生數字輸入框的上下箭頭 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* 簡單的小氣泡動畫 */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* 海龜出現動畫 */
        .turtle-icon {
            display: inline-block;
            animation: swimIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: translateX(20px);
        }
        @keyframes swimIn {
            to { opacity: 1; transform: translateX(0); }
        }
    </style>

    <script data-html-import-id="html-import-87">
        // 定義權重常數 (符合你設定的: 塑膠袋權重極高)
        const WEIGHTS = {
            bag: 200,
            bottle: 100,
            cup: 50,
            straw: 20
        };
        
        // 1 隻海龜生命 = 400 點威脅指數
        const THREAT_PER_TURTLE = 400;

        // 建立背景裝飾性氣泡
        function createBubbles() {
            const container = document.getElementById('bubbles-container');
            for(let i = 0; i < 20; i++) {
                let bubble = document.createElement('div');
                bubble.className = 'bubble';
                let size = Math.random() * 30 + 10; // 10px - 40px
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.animationDuration = (Math.random() * 5 + 5) + 's'; // 5s - 10s
                bubble.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(bubble);
            }
        }
        createBubbles();

        // 更新輸入框數值 (透過按鈕)
        function updateValue(type, change) {
            const input = document.getElementById(`input-${type}`);
            let val = parseInt(input.value) || 0;
            val += change;
            if (val < 0) val = 0; // 不允許負數
            input.value = val;
            calculate();
        }

        // 重設所有數值
        function resetValues() {
            document.getElementById('input-bag').value = 0;
            document.getElementById('input-bottle').value = 0;
            document.getElementById('input-cup').value = 0;
            document.getElementById('input-straw').value = 0;
            calculate();
        }

        // 核心計算與畫面更新函式
        function calculate() {
            // 1. 獲取數值
            const bags = parseInt(document.getElementById('input-bag').value) || 0;
            const bottles = parseInt(document.getElementById('input-bottle').value) || 0;
            const cups = parseInt(document.getElementById('input-cup').value) || 0;
            const straws = parseInt(document.getElementById('input-straw').value) || 0;

            // 2. 計算總威脅指數 (Total Threat Score)
            const totalScore = (bags * WEIGHTS.bag) + 
                               (bottles * WEIGHTS.bottle) + 
                               (cups * WEIGHTS.cup) + 
                               (straws * WEIGHTS.straw);
            
            document.getElementById('total-score-display').innerText = totalScore.toLocaleString();

            // 3. 計算拯救的海龜數 (無條件捨去取整數，代表完整救活一隻)
            const savedTurtles = Math.floor(totalScore / THREAT_PER_TURTLE);
            
            // 動畫跳動顯示數字
            animateValue(document.getElementById('result-number'), savedTurtles);

            // 4. 更新視覺化海龜區塊
            updateTurtleDisplay(savedTurtles);

            // 5. 更新鼓勵標語
            updateEncouragement(savedTurtles, totalScore);
        }

        // 數字跳動動畫效果
        function animateValue(obj, end, duration = 500) {
            let start = parseInt(obj.innerHTML) || 0;
            if (start === end) return;
            
            let range = end - start;
            let current = start;
            let increment = end > start ? 1 : -1;
            // 根據差距調整步伐，避免差太多時動畫太慢
            if(Math.abs(range) > 20) increment = end > start ? Math.ceil(range/20) : Math.floor(range/20);
            
            let stepTime = Math.abs(Math.floor(duration / (range/increment)));
            if (stepTime < 20) stepTime = 20;

            let timer = setInterval(function() {
                current += increment;
                if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
                    current = end;
                    clearInterval(timer);
                }
                obj.innerHTML = current;
            }, stepTime);
        }

        // 動態生成海龜圖示 (超過一定數量會群組顯示避免塞爆畫面)
        function updateTurtleDisplay(count) {
            const container = document.getElementById('turtle-display-area');
            container.innerHTML = ''; // 清空

            if (count === 0) {
                container.innerHTML = '<span class="text-white/50 text-sm italic w-full">開始減少塑膠，讓海龜游進來吧！</span>';
                return;
            }

            // 限制最多顯示 24 隻圖示，太多會改用文字輔助
            const maxIcons = 24;
            let displayCount = Math.min(count, maxIcons);

            for (let i = 0; i < displayCount; i++) {
                // 使用 SVG 海龜圖示，並加上延遲動畫
                let turtle = document.createElement('div');
                turtle.className = 'turtle-icon text-3xl sm:text-4xl filter drop-shadow-md';

                container.appendChild(turtle);
            }

            if (count > maxIcons) {
                let moreInfo = document.createElement('div');
                moreInfo.className = 'w-full text-center text-sm font-bold mt-2 text-cyan-200 animate-pulse';
                moreInfo.innerText = `...以及另外 ${count - maxIcons} 隻在遠方獲救的海龜！`;
                container.appendChild(moreInfo);
            }
        }

        // 根據拯救數量更新標語
        function updateEncouragement(count, score) {
            const textEl = document.getElementById('encouragement-text');
            
            if (score > 0 && count === 0) {
                textEl.innerText = "快了快了！再減少一點塑膠就能救下一隻海龜！";

                textEl.className = "mt-6 text-lg font-bold text-green-300 h-8";

                textEl.className = "mt-6 text-xl font-black text-pink-300 drop-shadow-md h-8";
            } else {
                textEl.innerText = "每一個微小的改變，都在拯救生命！";
                textEl.className = "mt-6 text-lg font-bold text-cyan-200 h-8";
            }
        }
        
        // 初始計算一次確保狀態正確
        calculate();
    </script>
